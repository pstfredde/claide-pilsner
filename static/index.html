<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilsnerfilmsboten</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Special+Elite&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a1209;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Special Elite', monospace;
      color: #e8d5a3;
    }

    /* Filmremsa överst */
    .filmremsa {
      width: 100%;
      height: 36px;
      background: #0d0900;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 2px solid #3a2a10;
      flex-shrink: 0;
    }
    .filmremsa-hal {
      width: 20px; height: 14px;
      background: #1a1209;
      border-radius: 3px;
      border: 1px solid #3a2a10;
      flex-shrink: 0;
    }

    /* Header */
    header {
      width: 100%;
      max-width: 700px;
      text-align: center;
      padding: 28px 20px 16px;
      border-bottom: 1px solid #5a3e1b;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #f0d97a;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }
    header p {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8a6a3a;
      margin-top: 6px;
    }

    /* Chatfönster */
    #chat {
      width: 100%;
      max-width: 700px;
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubbla {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 2px;
      line-height: 1.6;
      font-size: 0.95rem;
      position: relative;
    }

    /* Karaktärens bubblor — vänster */
    .bubbla.karaktar {
      align-self: flex-start;
      background: #2a1f0d;
      border: 1px solid #5a3e1b;
      border-left: 3px solid #c8902a;
      color: #e8d5a3;
    }
    .bubbla.karaktar::before {
      content: attr(data-namn);
      display: block;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c8902a;
      margin-bottom: 6px;
    }

    /* Användarens bubblor — höger */
    .bubbla.anvandare {
      align-self: flex-end;
      background: #0d1a0d;
      border: 1px solid #2a5a2a;
      border-right: 3px solid #4a8a4a;
      color: #c8e0c8;
    }

    /* Spinner */
    .skriver {
      align-self: flex-start;
      display: flex;
      gap: 6px;
      padding: 14px 18px;
      background: #2a1f0d;
      border: 1px solid #5a3e1b;
      border-left: 3px solid #c8902a;
      border-radius: 2px;
    }
    .skriver span {
      width: 8px; height: 8px;
      background: #c8902a;
      border-radius: 50%;
      animation: studsa 1.2s infinite ease-in-out;
    }
    .skriver span:nth-child(2) { animation-delay: 0.2s; }
    .skriver span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes studsa {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    /* Inputfält */
    footer {
      width: 100%;
      max-width: 700px;
      padding: 16px 20px 24px;
      border-top: 1px solid #5a3e1b;
    }
    #form {
      display: flex;
      gap: 10px;
    }
    #inmatning {
      flex: 1;
      background: #0d0900;
      border: 1px solid #5a3e1b;
      border-radius: 2px;
      color: #e8d5a3;
      font-family: 'Special Elite', monospace;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #inmatning:focus { border-color: #c8902a; }
    #inmatning::placeholder { color: #5a3e1b; }

    #skicka {
      background: #3a2a10;
      border: 1px solid #c8902a;
      border-radius: 2px;
      color: #f0d97a;
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #skicka:hover { background: #5a3e1b; }
    #skicka:disabled { opacity: 0.4; cursor: default; }

    /* Filmremsa nederst */
    .filmremsa-botten { border-top: 2px solid #3a2a10; border-bottom: none; }
  </style>
</head>
<body>

  <div class="filmremsa" aria-hidden="true">
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
  </div>

  <header>
    <h1 id="titel">Pilsnerfilmsboten</h1>
    <p>Stockholm &middot; 1940-talet &middot; AI-kompis</p>
  </header>

  <div id="chat" role="log" aria-live="polite"></div>

  <footer>
    <form id="form" autocomplete="off">
      <input id="inmatning" type="text" placeholder="Skriv något till honom…" autofocus>
      <button id="skicka" type="submit">Skicka</button>
    </form>
  </footer>

  <div class="filmremsa filmremsa-botten" aria-hidden="true">
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
    <div class="filmremsa-hal"></div><div class="filmremsa-hal"></div>
  </div>

  <script>
    const chat      = document.getElementById('chat');
    const form      = document.getElementById('form');
    const inmatning = document.getElementById('inmatning');
    const skicka    = document.getElementById('skicka');
    const titel     = document.getElementById('titel');

    let sessionId = localStorage.getItem('pilsner_session') || '';
    let karaktärNamn = 'Boten';

    // Hämta karaktärnamn från backend
    fetch('/api/karaktär')
      .then(r => r.json())
      .then(d => {
        karaktärNamn = d.karaktär.charAt(0).toUpperCase() + d.karaktär.slice(1);
        titel.textContent = karaktärNamn;
        document.title = karaktärNamn + ' — Pilsnerfilmsboten';
        // Öppningsreplik
        visa(karaktärNamn, 'Hälsa och presentera dig kort!', true);
      });

    function visa(avsändare, text, frånBot) {
      // Om det är öppningsanropet — hämta faktiskt svar från API
      if (frånBot && text === 'Hälsa och presentera dig kort!') {
        const spinner = läggTillSpinner();
        skickaFörfrågan('Hälsa och presentera dig kort!', true).then(svar => {
          spinner.remove();
          läggTillBubbla(karaktärNamn, svar, true);
        });
        return;
      }
      läggTillBubbla(avsändare, text, frånBot);
    }

    function läggTillBubbla(avsändare, text, frånBot) {
      const div = document.createElement('div');
      div.className = 'bubbla ' + (frånBot ? 'karaktar' : 'anvandare');
      if (frånBot) div.dataset.namn = avsändare;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function läggTillSpinner() {
      const div = document.createElement('div');
      div.className = 'skriver';
      div.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function skickaFörfrågan(meddelande, tystläge = false) {
      const svar = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ meddelande, session_id: sessionId })
      });
      const data = await svar.json();
      sessionId = data.session_id;
      localStorage.setItem('pilsner_session', sessionId);
      return data.svar;
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const text = inmatning.value.trim();
      if (!text) return;

      inmatning.value = '';
      skicka.disabled = true;

      läggTillBubbla('Du', text, false);
      const spinner = läggTillSpinner();

      try {
        const svar = await skickaFörfrågan(text);
        spinner.remove();
        läggTillBubbla(karaktärNamn, svar, true);
      } catch {
        spinner.remove();
        läggTillBubbla('FEL', 'Något gick snett — försök igen.', true);
      } finally {
        skicka.disabled = false;
        inmatning.focus();
      }
    });
  </script>
</body>
</html>
